<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLESSEDREALTY™ | AI Futuristic Luxury Real Estate Nigeria</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
    <style>
        :root { --gold: #D4AF37; --dark-gold: #996515; --black: #0A0A0A; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--white); color: var(--black); padding-bottom: 80px; }
        
        /* --- CORE CSS --- */
        nav { background: rgba(10, 10, 10, 0.98); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--dark-gold); }
        .menu-trigger { color: var(--gold); font-size: 1.8rem; cursor: pointer; background: none; border: none; }
        .logo { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 3px; font-weight: bold; }
        .side-menu { position: fixed; top: 0; left: -100%; width: 350px; height: 100%; background: var(--black); transition: 0.5s; z-index: 3000; padding: 60px 25px; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .close-menu { position: absolute; top: 20px; right: 25px; color: var(--gold); cursor: pointer; }
        
        .price-filter-container { background: #151515; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .price-slider { width: 100%; accent-color: var(--gold); cursor: pointer; }
        .price-val { color: white; font-weight: 600; margin-top: 10px; }
        
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.5)), url('https://unsplash.com') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; }
        .hero h1 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 5px; }
        
        .container { max-width: 1200px; margin: 50px auto; padding: 0 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { border-radius: 15px; overflow: hidden; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 20px; }
        .price { display: block; font-size: 1.2rem; font-weight: 700; color: var(--black); margin-top: 10px; }
        
        /* --- WHATSAPP & FORMS --- */
        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 30px; right: 30px; background-color: #25d366; color: white; border-radius: 50px; text-align: center; z-index: 4000; font-size: 30px; line-height: 60px; }
        .corp-form input, .corp-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: white; border: 1px solid #333; }
        .submit-btn { width: 100%; background: var(--gold); border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sideMenu" class="side-menu">
        <span class="close-menu" onclick="toggleMenu()">&times;</span>
        <h3 style="color:var(--gold);">PORTAL</h3>
        
        <!-- PRICE FILTER -->
        <div class="price-filter-container">
            <label style="color:white; font-size:0.8rem;">MAX BUDGET (₦)</label>
            <input type="range" id="priceRange" min="10000000" max="1500000000" step="10000000" value="1500000000" class="price-slider" oninput="applyFilters()">
            <div class="price-val" id="priceDisplay">₦1,500,000,000</div>
        </div>
        
        <form action="https://formspree.io" method="POST" class="corp-form">
            <input type="text" name="Name" placeholder="Name" required>
            <input type="email" name="Email" placeholder="Email" required>
            <button type="submit" class="submit-btn">APPLY</button>
        </form>
    </div>

    <nav>
        <button class="menu-trigger" onclick="toggleMenu()">☰</button>
        <div class="logo">𝗕𝗟𝗘𝗦𝗦𝗘𝗗𝐑𝙴𝗔𝗟𝚃𝗬™</div>
        <div></div>
    </nav>

    <section class="hero">
        <h1>SECURE THE FUTURE</h1>
        <input type="text" id="propertySearch" placeholder="Search locations..." onkeyup="applyFilters()" style="padding:15px; width:80%; max-width:400px; border-radius:25px; border:none; margin-top:20px;">
    </section>

    <!-- LISTINGS -->
    <div class="container" id="propertyGrid">
        <div class="card" data-price="35000000" data-name="Ibeju-Lekki">
            <img src="https://unsplash.com" alt="Land">
            <div class="card-body"><h3>Heritage Estate</h3><p>Ibeju-Lekki, Lagos</p><span class="price">₦35,000,000</span></div>
        </div>
        <div class="card" data-price="1200000000" data-name="Ikoyi">
            <img src="https://unsplash.com" alt="Villa">
            <div class="card-body"><h3>The Zenith</h3><p>Ikoyi, Lagos</p><span class="price">₦1,200,000,000</span></div>
        </div>
    </div>

    <!-- WHATSAPP -->
    <a href="https://wa.me" class="whatsapp-float" target="_blank"><i class="fa fa-whatsapp"></i></a>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
        function applyFilters() {
            let search = document.getElementById('propertySearch').value.toLowerCase();
            let maxPrice = parseInt(document.getElementById('priceRange').value);
            document.getElementById('priceDisplay').innerText = "₦" + maxPrice.toLocaleString();
            document.querySelectorAll('.card').forEach(card => {
                let p = parseInt(card.getAttribute('data-price'));
                let n = card.getAttribute('data-name').toLowerCase();
                card.style.display = (p <= maxPrice && n.includes(search)) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
